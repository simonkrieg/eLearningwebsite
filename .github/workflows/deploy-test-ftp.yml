name: Deploy test site by FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: https://yxdyuyvqevusxtvcmozc.supabase.co
  VITE_SUPABASE_ANON_KEY: sb_publishable_6pGvU3_nX5UkFHP047FnJg_C717pJrh

jobs:
  build-and-deploy:
    name: Build and upload test site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and build
        run: npm run deploy:check

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload dist to cPanel FTP
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lftp
          echo "Built files:"
          find dist -maxdepth 2 -type f -print
          lftp -u "simon@elearningcreations.com.au","${CPANEL_FTP_PASSWORD}" ftp://ftp.elearningcreations.com.au <<'FTP'
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          pwd
          cls -la
          cd ../../test.elearningcreations.com.au
          pwd
          cls -la
          mirror --reverse --verbose --only-newer dist .
          cls -la
          bye
          FTP
        env:
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
