name: Deploy test site by FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: https://yxdyuyvqevusxtvcmozc.supabase.co
  VITE_SUPABASE_ANON_KEY: sb_publishable_6pGvU3_nX5UkFHP047FnJg_C717pJrh

jobs:
  build-and-deploy:
    name: Build and upload test site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and build
        run: npm run deploy:check

      - name: Upload dist to cPanel FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.elearningcreations.com.au
          username: simon@elearningcreations.com.au
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: ../test.elearningcreations.com.au/
          log-level: verbose
